<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="Audio to text logo">
  <rect width="400" height="200" fill="#ffffff"/>

  <!-- Soft background blobs -->
  <path d="M70,100 Q75,60 120,55 T170,100 T120,145 T70,100" fill="#e7f5fa" opacity="0.78"/>
  <path d="M220,100 Q225,50 280,55 T330,100 T280,155 T220,100" fill="#e7f5fa" opacity="0.78"/>

  <!-- Audio source icon -->
  <g stroke="#375b6b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="90" y="60" width="80" height="80" rx="15" fill="#f8fcfe"/>
  </g>

  <!-- Wave bars -->
  <g stroke="#0a7ea4" stroke-width="3.2" stroke-linecap="round">
    <line x1="110" y1="85" x2="110" y2="115"/>
    <line x1="120" y1="75" x2="120" y2="125"/>
    <line x1="130" y1="90" x2="130" y2="110"/>
    <line x1="140" y1="70" x2="140" y2="130"/>
    <line x1="150" y1="85" x2="150" y2="115"/>
  </g>

  <!-- Process arrows -->
  <g stroke="#375b6b" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M185,85 L210,85 L205,80 M210,85 L205,90"/>
    <path d="M175,100 L220,100 L215,95 M220,100 L215,105"/>
    <path d="M185,115 L210,115 L205,110 M210,115 L205,120"/>
  </g>

  <!-- Output document stack -->
  <g stroke="#375b6b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M245,70 L290,70 L305,85 L305,145 Q305,150 300,150 L245,150 Q240,150 240,145 L240,75 Q240,70 245,70 Z" fill="#f8fcfe" stroke="#8ac6dd"/>
    <path d="M235,60 L280,60 L295,75 L295,135 Q295,140 290,140 L235,140 Q230,140 230,135 L230,65 Q230,60 235,60 Z" fill="#f8fcfe" stroke="#375b6b"/>
    <polyline points="280,60 280,75 295,75"/>
  </g>

  <!-- Text lines on front document -->
  <g stroke="#0a7ea4" stroke-width="2" opacity="0.92" stroke-linecap="round">
    <line x1="245" y1="85" x2="280" y2="85"/>
    <line x1="245" y1="95" x2="280" y2="95"/>
    <line x1="245" y1="105" x2="280" y2="105"/>
    <line x1="245" y1="115" x2="280" y2="115"/>
    <line x1="245" y1="125" x2="265" y2="125"/>
  </g>
</svg>
